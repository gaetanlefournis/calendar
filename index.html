<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0a0a0a">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <title>Voice Calendar</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="header-left">
                <h1 class="app-logo">VoiceCal</h1>
            </div>
            <div class="header-right">
                <button class="header-btn" id="todayBtn" title="Go to today">Today</button>
                <button class="header-btn view-btn active" data-view="month" title="Month view">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                        <line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line>
                        <line x1="3" y1="10" x2="21" y2="10"></line>
                    </svg>
                </button>
                <button class="header-btn view-btn" data-view="week" title="Week view">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                        <line x1="8" y1="2" x2="8" y2="6"></line><line x1="16" y1="2" x2="16" y2="6"></line>
                        <line x1="3" y1="10" x2="21" y2="10"></line>
                        <line x1="8" y1="10" x2="8" y2="22"></line><line x1="16" y1="10" x2="16" y2="22"></line>
                    </svg>
                </button>
                <button class="header-btn view-btn" data-view="agenda" title="Agenda view">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line>
                        <line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line>
                        <line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line>
                    </svg>
                </button>
                <button class="header-btn" id="syncBtn" title="Sync with Google Calendar">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="23 4 23 10 17 10"></polyline>
                        <polyline points="1 20 1 14 7 14"></polyline>
                        <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
                    </svg>
                    <span id="syncStatus">Sync</span>
                </button>
            </div>
        </header>

        <!-- Voice Control Bar -->
        <div class="voice-bar">
            <button class="mic-btn" id="micButton">
                <div class="mic-icon-container">
                    <svg class="mic-svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
                        <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                        <line x1="12" y1="19" x2="12" y2="23"></line>
                        <line x1="8" y1="23" x2="16" y2="23"></line>
                    </svg>
                </div>
                <div class="voice-text" id="voiceStatus">Tap mic & speak</div>
            </button>
            <div class="voice-examples" id="voiceExamples">
                Try: "Grocery shopping tomorrow 9 to 10 AM"
            </div>
        </div>

        <!-- Navigation Bar -->
        <div class="nav-bar">
            <button class="nav-arrow" id="prevPeriod">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <polyline points="15 18 9 12 15 6"></polyline>
                </svg>
            </button>
            <h2 class="nav-title" id="navTitle">May 2026</h2>
            <button class="nav-arrow" id="nextPeriod">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <polyline points="9 18 15 12 9 6"></polyline>
                </svg>
            </button>
        </div>

        <!-- Calendar Views Container -->
        <div class="views-container">
            <!-- Month View -->
            <div class="view-panel active" id="monthView">
                <div class="weekday-headers">
                    <span>S</span><span>M</span><span>T</span><span>W</span><span>T</span><span>F</span><span>S</span>
                </div>
                <div class="month-grid" id="monthGrid"></div>
            </div>

            <!-- Week View -->
            <div class="view-panel" id="weekView">
                <div class="week-scroll" id="weekScroll"></div>
            </div>

            <!-- Agenda View -->
            <div class="view-panel" id="agendaView">
                <div class="agenda-list" id="agendaList"></div>
            </div>
        </div>

        <!-- Floating Add Button -->
        <button class="fab" id="addEventFab" title="Add event">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                <line x1="12" y1="5" x2="12" y2="19"></line>
                <line x1="5" y1="12" x2="19" y2="12"></line>
            </svg>
        </button>

        <!-- Event Modal -->
        <div class="modal-overlay" id="eventModal">
            <div class="modal-sheet">
                <div class="modal-handle"></div>
                <div class="modal-header">
                    <h3 id="modalTitle">New Event</h3>
                    <button class="modal-close" id="closeModal">&times;</button>
                </div>
                <form id="eventForm" class="modal-form">
                    <div class="form-field">
                        <label>Title</label>
                        <input type="text" id="eventTitle" placeholder="What's the event?" required autocomplete="off">
                    </div>
                    <div class="form-field">
                        <label>Date</label>
                        <input type="date" id="eventDate" required>
                    </div>
                    <div class="form-row">
                        <div class="form-field">
                            <label>Start</label>
                            <input type="time" id="eventStart" required>
                        </div>
                        <div class="form-field">
                            <label>End</label>
                            <input type="time" id="eventEnd" required>
                        </div>
                    </div>
                    <div class="form-field">
                        <label>Notes</label>
                        <textarea id="eventNotes" rows="2" placeholder="Optional notes..."></textarea>
                    </div>
                    <div class="form-actions">
                        <button type="button" class="btn-delete" id="deleteEventBtn">Delete</button>
                        <button type="submit" class="btn-save">Save Event</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Toast Notification -->
        <div class="toast" id="toast"></div>
    </div>

    <!-- Google Calendar API -->
    <script src="https://apis.google.com/js/api.js"></script>
    <script src="https://accounts.google.com/gsi/client"></script>
    <script src="google-calendar.js"></script>
    <script src="app.js"></script>
</body>
</html>
